<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBSYS | Form Peminjaman Buku</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ===== Navbar ===== -->
    <header class="navbar">
        <div class="container nav-content">

            <div class="logo">
                📚 LIBSYS
            </div>

            <nav>
                <ul>
                    <li><a href="index.html" class="active">Form Peminjaman</a></li>
                    <li><a href="data.html">Data Peminjaman</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- ===== Hero ===== -->
    <section class="hero">

        <div class="container">

            <h1>Library Management System</h1>

            <p>
                Isi formulir berikut untuk melakukan peminjaman buku di perpustakaan.
            </p>

        </div>

    </section>

    <!-- ===== Form ===== -->

    <section class="container">

        <div class="card">

            <h2>Form Peminjaman Buku</h2>

            <p class="subtitle">
                Silakan lengkapi data di bawah ini.
            </p>

            <p id="pesanError" class="error"></p>

            <form id="formPerpustakaan">

                <div class="form-group">
                    <label>Nama Peminjam</label>
                    <input
                        type="text"
                        id="nama"
                        placeholder="Masukkan nama lengkap">
                </div>

                <div class="form-group">
                    <label>NIM</label>
                    <input
                        type="text"
                        id="nim"
                        maxlength="8"
                        placeholder="Contoh : 24123456">
                </div>

                <div class="form-group">
                    <label>Judul Buku</label>
                    <input
                        type="text"
                        id="buku"
                        placeholder="Masukkan judul buku">
                </div>

                <div class="form-group">
                    <label>Kategori Buku</label>

                    <select id="kategori">

                        <option value="">-- Pilih Kategori --</option>

                        <option>Novel</option>

                        <option>Teknologi</option>

                        <option>Pendidikan</option>

                        <option>Sejarah</option>

                        <option>Agama</option>

                        <option>Komik</option>

                    </select>

                </div>

                <div class="form-group">
                    <label>Tanggal Peminjaman</label>

                    <input
                        type="date"
                        id="tanggal">
                </div>

                <div class="form-group">
                    <label>Keterangan</label>

                    <textarea
                        id="keterangan"
                        rows="4"
                        placeholder="Tambahkan keterangan jika diperlukan"></textarea>

                </div>

                <div class="button-group">

                    <button
                        type="submit"
                        class="btn-primary">
                        Simpan Data
                    </button>

                    <button
                        type="reset"
                        class="btn-secondary">
                        Reset
                    </button>

                </div>

            </form>

        </div>

    </section>

    <!-- ===== Footer ===== -->

    <footer>

        <div class="container">

            <p>
                © 2026 LIBSYS | Sistem Peminjaman Buku Perpustakaan
            </p>

        </div>

    </footer>

    <script src="js/script.js"></script>


</body>
</html>
